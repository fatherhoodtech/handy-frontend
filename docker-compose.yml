services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: handy-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://host.docker.internal:8080
    command: npm run dev -- --host 0.0.0.0 --port 5173
