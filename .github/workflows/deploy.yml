name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            # Clone repo on first deploy, pull on subsequent ones
            if [ ! -d /root/handy-frontend ]; then
              git clone https://x-access-token:${{ secrets.DEPLOY_REPO_PAT }}@github.com/fatherhoodtech/handy-frontend.git /root/handy-frontend
            else
              cd /root/handy-frontend
              git pull https://x-access-token:${{ secrets.DEPLOY_REPO_PAT }}@github.com/fatherhoodtech/handy-frontend.git main
            fi

            cd /root/Handy-Dudes-Node-Quote-Engine/deploy/handy.us.eqv.rw
            docker compose build frontend
            docker compose up -d frontend
